name: Meanweber Auto Blog Updater

on:
  schedule:
    # Runs at 01:00 UTC (which is 08:00 AM UTC+7 Thailand Time) every day
    - cron: '0 1 * * *'
  # Allows you to manually trigger this workflow from the GitHub UI Actions tab
  workflow_dispatch: 

jobs:
  run-bot-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push code back to the repository
      
    steps:
      - name: 📥 Checkout Code Repository
        uses: actions/checkout@v4
      
      - name: ⚙️ Setup Node.js Engine
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: 📦 Install Bot Dependencies
        run: npm install
        
      - name: 🤖 Run AI Daily News Script
        run: npm start
        env:
          # Injects the key silently without logging it
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
      - name: 💾 Commit and Push Updates
        run: |
          git config --global user.name "Meanweber AI Bot"
          git config --global user.email "bot@meanweber.com"
          
          # Check if there are changes. If there are, commit and push!
          git diff --quiet || (git add content/data.js && git commit -m "🤖 Auto-Update: Daily Tech News Added" && git push)
